<script type="text/babel">
const clampK = (t, start, end) => Math.max(0, Math.min(1, (t - start) / Math.max(0.0001, end - start)));
const lerp = (a, b, k) => a + (b - a) * k;

// Square 1080×1080 video frame with transparent background. The scene
// content (booking flow) renders into a centered 670×920 portrait region
// inside the 1080×1080 — leaving transparent margins on left, right, top,
// and bottom so the asset can be composited on top of a hero background.
//
// The scene is authored in a 1080-wide design coord system that's been
// extended vertically to 1080 × 1483 (preserves 670:920 aspect — i.e.
// 1080 × (920/670) ≈ 1483). All existing layouts that were tuned against
// SCENE = 1080 (square) live in the top 1080 of vertical design space;
// SCENE_H = 1483 is the new vertical ceiling, used by anything that
// needs to position relative to the bottom of the scene.
// Visible scene content is capped at 668 wide; the surrounding STAGE is the
// transparent canvas the exporter writes to. Height auto-grows from the
// design aspect ratio so content isn't cropped.
const SCENE_RENDERED_W = 668;
const SCENE_RENDERED_H = 920;
const STAGE_W = 1080;
// Stage height grows if needed to fit the (possibly taller) scene with the
// same vertical margin (~80) above and below.
const STAGE_H = Math.max(1080, SCENE_RENDERED_H + 160);
const SCENE = 1080;       // legacy alias — design coord WIDTH (kept so existing math works)
const SCENE_W = 1080;     // design coord width
const SCENE_H = Math.round(SCENE_W * SCENE_RENDERED_H / SCENE_RENDERED_W); // 1483 — design coord height
const SCENE_SCALE = SCENE_RENDERED_W / SCENE_W; // ≈ 0.620
const INNER_OFFSET_X = (STAGE_W - SCENE_RENDERED_W) / 2; // 205
const INNER_OFFSET_Y = (STAGE_H - SCENE_RENDERED_H) / 2; // 80
const INNER_W = SCENE_RENDERED_W;
const INNER_H = SCENE_RENDERED_H;

// Timeline (extended):

// ──────────────── Cursor ────────────────
// Classic OS-style arrow pointer (the cursor people see in real screen
// recordings): black fill, crisp white border, hot-spot at the very tip.
// SVG is drawn so the tip sits at local (3, 3); we translate by (-3, -3)
// so the rendered (x, y) IS the click point.
const Cursor = ({ x, y, tap = false, opacity = 1 }) => (
  <div style={{
    position: 'absolute', left: x, top: y,
    width: 28, height: 32, pointerEvents: 'none',
    opacity,
    zIndex: 300,
  }}>
    <div style={{
      width: '100%', height: '100%',
      transform: `translate(-3px, -3px) scale(${tap ? 0.86 : 1})`,
      transformOrigin: '3px 3px',
      transition: 'transform 0.10s cubic-bezier(0.4, 0, 0.2, 1)',
      filter: 'drop-shadow(0 2px 4px rgba(0,0,0,0.35))',
    }}>
    <svg viewBox="0 0 28 32" width="28" height="32">
      {/*
        Macintosh-style arrow:
        Tip at (3,3), slants down-right, hooks back at the bottom into a
        short tail. Two paths: white "halo" (slightly outset) underneath a
        black fill — gives the crisp double-stroke OS pointer look without
        relying on stroke alignment quirks.
      */}
      <path
        d="M 3 3
           L 3 22.5
           L 8.4 17.6
           L 11.6 24.6
           L 14.4 23.4
           L 11.2 16.6
           L 18.4 16.6
           Z"
        fill="white"
        stroke="white"
        strokeWidth="2.4"
        strokeLinejoin="round"
        strokeLinecap="round"
      />
      <path
        d="M 3 3
           L 3 22.5
           L 8.4 17.6
           L 11.6 24.6
           L 14.4 23.4
           L 11.2 16.6
           L 18.4 16.6
           Z"
        fill="#0E2235"
      />
    </svg>
    </div>
  </div>
);

    case 'rates': // dollar in rounded square

          <path d="M12 6.6v1.5c-1.6.05-2.7.95-2.7 2.3 0 1.4 1 2 2.7 2.5 1.2.35 1.6.65 1.6 1.2 0 .55-.5.95-1.5.95-1.05 0-1.65-.5-1.7-1.3H8.7c.05 1.5 1.05 2.5 2.6 2.7v1.55h1.4v-1.55c1.7-.15 2.7-1 2.7-2.4 0-1.45-.95-2.05-2.65-2.55-1.25-.4-1.65-.65-1.65-1.2 0-.5.45-.85 1.4-.85.95 0 1.55.45 1.6 1.2h1.6c-.05-1.4-1-2.3-2.5-2.5V6.6H12z" fill="var(--icon-bg, #1A2530)" />

// Order matches the user's screenshot: Dashboard, New bookings, Bookings, Calendar, Rates, Rooms, Guests, Payments, Invoicing, Statistics
const SIDEBAR_ITEMS = [
  { id: 'dashboard',  label: 'Dashboard',    icon: 'dashboard'  },
  { id: 'newbooking', label: 'New bookings', icon: 'newbooking' },
  { id: 'bookings',   label: 'Bookings',     icon: 'bookings'   },
  { id: 'calendar',   label: 'Calendar',     icon: 'calendar'   },
  { id: 'rates',      label: 'Rates',        icon: 'rates'      },
  { id: 'rooms',      label: 'Rooms',        icon: 'rooms'      },
  { id: 'channels',   label: 'Channels',     icon: 'channels'   },
  { id: 'guests',     label: 'Guests',       icon: 'guests'     },
  { id: 'payments',   label: 'Payments',     icon: 'payments'   },
  { id: 'invoicing',  label: 'Invoicing',    icon: 'invoicing'  },
  { id: 'statistics', label: 'Statistics',   icon: 'statistics' },
];

// Geometry used for cursor alignment
const SB_W = 360;
const SB_HEADER_H = 130;     // logo + name placeholders
const SB_HPAD = 22;
const SB_ITEM_H = 60;
const SB_ITEM_GAP = 3;
const sidebarItemY = (idx) => SB_HEADER_H + idx * (SB_ITEM_H + SB_ITEM_GAP) + SB_ITEM_H / 2;

// ──────────────── Save confirmation toast ────────────────
// Floats in from the top after "Save booking" is pressed, holds, then fades.
// k: 0..1 visibility (caller drives it as inK*outK).
const SaveToast = ({ k }) => {
  if (k <= 0.001) return null;
  // Two-phase ease: first 30% pops down + scales up, last 30% fades up.
  const slide = Math.min(1, k * 2);   // arrives quickly
  const fade  = k;                     // overall opacity
  return (
    <div style={{
      position: 'absolute',
      top: 80,
      left: '50%',
      transform: `translate(-50%, ${(1 - slide) * -48}px) scale(${0.94 + 0.06 * slide})`,
      opacity: fade,
      zIndex: 200,
      pointerEvents: 'none',
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', gap: 22,
        padding: '24px 36px 24px 28px',
        background: 'white',
        border: `1px solid ${C.line}`,
        borderRadius: 22,
        boxShadow: '0 24px 64px rgba(14,34,53,0.18), 0 4px 12px rgba(14,34,53,0.08)',
        minWidth: 560,
      }}>
        {/* Animated check circle */}
        <div style={{
          width: 64, height: 64, borderRadius: '50%',
          background: C.greenAccent,
          display: 'grid', placeItems: 'center',
          flexShrink: 0,
          boxShadow: `0 0 0 ${10 * (1 - slide)}px rgba(31,191,122,0.25)`,
        }}>
          <svg width="34" height="34" viewBox="0 0 24 24" fill="none">
            <path d="M5 12.5l4.5 4.5L19 7"
                  stroke="white" strokeWidth="2.8"
                  strokeLinecap="round" strokeLinejoin="round"
                  strokeDasharray="24"
                  strokeDashoffset={24 * (1 - Math.min(1, slide * 1.4))} />
          </svg>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
          <div style={{ fontSize: 30, fontWeight: 700, color: C.text, letterSpacing: -0.3 }}>
            Booking saved
          </div>
          <div style={{ fontSize: 20, color: C.mute, fontWeight: 500 }}>
            Booking #26142 · Noah Adams
          </div>
        </div>
      </div>
    </div>
  );
};

const Sidebar = ({ activeId, hoveredId, slideK, introT = -1 }) => {
  // Per-item pop intro: each item pulses (scale + brightness) in sequence
  // when the menu first opens. Stagger 0.07s, individual pop runs 0.32s.
  const POP_STAGGER = 0.07;
  const POP_DUR = 0.32;
  const itemPopK = (idx) => {
    if (introT < 0) return 0;
    const start = idx * POP_STAGGER;
    const t = introT - start;
    if (t <= 0 || t >= POP_DUR) return 0;
    // bell curve: 0 → peak at 0.4 → 0
    const k = t / POP_DUR;
    return Math.sin(k * Math.PI);
  };
  return (
    <div style={{
      position: 'absolute',
      left: STEP_PAD,
      top: STEP_BOX_TOP + STEP_PAD,
      // Sidebar collapses to its menu items' natural height (top-anchored,
      // matching the cards which also fit-to-content).
      height: 'auto',
      width: SB_W,
      background: C.sidebarBg,
      transform: `translateX(${(slideK - 1) * (SB_W + STEP_PAD)}px)`,
      boxShadow: slideK > 0.05 ? '24px 0 60px rgba(0,0,0,0.30)' : 'none',
      transition: 'box-shadow 0.3s',
      zIndex: 50,
      display: 'flex', flexDirection: 'column',
      paddingTop: 28,
      paddingBottom: 28,
      overflow: 'hidden',
    }}>
      {/* Logo + hotel name placeholder */}
      <div style={{
        display: 'flex', alignItems: 'center', gap: 16,
        padding: `0 ${SB_HPAD}px`,
        marginBottom: 26,
      }}>
        {/* Sirvoy logo */}
        <div style={{
          width: 56, height: 56, borderRadius: 11,
          overflow: 'hidden',
          flexShrink: 0,
        }}>
          <img src="channels/sirvoy-logo.svg" alt="Sirvoy"
            style={{ width: '100%', height: '100%', display: 'block' }} />
        </div>
        {/* placeholder name bars */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8, flex: 1 }}>
          <div style={{ height: 11, width: 140, borderRadius: 6, background: 'rgba(255,255,255,0.18)' }} />
          <div style={{ height: 11, width: 96, borderRadius: 6, background: 'rgba(255,255,255,0.13)' }} />
        </div>
      </div>

      {/* Menu items */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: SB_ITEM_GAP, padding: `0 ${SB_HPAD}px` }}>
        {SIDEBAR_ITEMS.map((it, idx) => {
          const isActive = activeId === it.id;
          const isHover  = hoveredId === it.id && !isActive;
          const popK     = itemPopK(idx);                       // 0..1 bell, 0 outside window
          const scale    = 1 + popK * 0.04;
          const popBg    = popK > 0 && !isActive
            ? `rgba(255,255,255,${0.10 + popK * 0.10})`
            : null;
          return (
            <div key={it.id} data-cursor-target={`sb-${it.id}`} style={{
              display: 'flex', alignItems: 'center', gap: 16,
              height: SB_ITEM_H,
              padding: '0 16px',
              borderRadius: 11,
              background: isActive ? '#FFFFFF' : popBg || (isHover ? 'rgba(255,255,255,0.08)' : 'transparent'),
              transition: 'background 0.25s, transform 0.25s, box-shadow 0.25s',
              boxShadow: isActive
                ? '0 3px 10px rgba(0,0,0,0.18)'
                : popK > 0 ? `0 4px 14px rgba(31,191,122,${popK * 0.18})` : 'none',
              transform: isHover && !isActive
                ? `translateX(4px) scale(${scale})`
                : `scale(${scale})`,
            }}>
              <span style={{
                width: 28, height: 28, display: 'flex', alignItems: 'center', justifyContent: 'center',
                color: isActive ? '#1A2530' : '#FFFFFF',
                opacity: 1,
                // Cutouts inside icons read this var so they match the pill bg
                ['--icon-bg']: isActive ? '#FFFFFF' : C.sidebarBg,
                transition: 'color 0.25s',
                transform: `scale(${1 + popK * 0.10})`,
              }}><Icon name={it.icon} /></span>
              <span style={{
                fontSize: 19, fontWeight: isActive ? 700 : (popK > 0.3 ? 700 : 500),
                letterSpacing: -0.2,
                color: isActive
                  ? C.text
                  : popK > 0
                    ? `rgba(255, 255, 255, ${0.55 + popK * 0.45})`
                    : 'rgba(255,255,255,0.55)',
                transition: 'color 0.25s',
              }}>{it.label}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
};

              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M6 3v18l6-4 6 4V3z" stroke="#0E2235" strokeWidth="1.8" strokeLinejoin="round"/></svg>

            <svg key="rr" width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M13 17l5-5-5-5M6 17l5-5-5-5" stroke="#0E2235" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>,

          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="16" rx="2" stroke="#0E2235" strokeWidth="1.8"/><path d="M3 9h18M8 3v4M16 3v4" stroke="#0E2235" strokeWidth="1.8" strokeLinecap="round"/></svg>

        {/* Day header row */}
        <div style={{
          display: 'grid',
          gridTemplateColumns: `${rowLabelW}px repeat(8, 1fr)`,
          borderBottom: `1px solid ${C.line}`, height: headerH,
        }}>
          <div style={{
            display: 'flex', alignItems: 'center', padding: '0 24px',
            fontSize: 14, fontWeight: 700, color: C.mute, letterSpacing: 1,
            textTransform: 'uppercase',
          }}>All room types</div>
          {CALENDAR_DAYS.map((d, i) => (
            <div key={i} style={{
              display: 'flex', flexDirection: 'column', alignItems: 'center',
              justifyContent: 'center', gap: 2,
              borderLeft: `1px solid ${C.line}`,
              background: d.today ? CAL_TODAY_BG : 'transparent',
            }}>
              <div style={{ fontSize: 13, color: C.mute, letterSpacing: 0.6, fontWeight: 600 }}>{d.dow}</div>
              <div style={{ fontSize: 16, color: C.text, fontWeight: d.today ? 800 : 700 }}>

              </div>
            </div>
          ))}
        </div>

        {/* Body rows */}
        {CALENDAR_ROWS.map((row, ri) => {
          const ap = rowAppear(ri);
          // Walk cells, tracking which day-column we're at
          const items = [];
          let col = 0;
          row.cells.forEach((cell, ci) => {
            if (cell.bk) {
              items.push({ kind: 'bk', start: col, ...cell.bk });
              col += cell.bk.span;
            } else {
              items.push({ kind: 'n', col, n: cell.n });
              col += 1;
            }
          });

          return (
            <div key={ri} style={{
              display: 'grid',
              gridTemplateColumns: `${rowLabelW}px repeat(8, 1fr)`,
              height: rowH,
              borderBottom: ri === CALENDAR_ROWS.length - 1 ? 'none' : `1px solid ${C.line}`,
              opacity: ap,
              transform: `translateY(${(1 - ap) * 8}px)`,
              position: 'relative',
            }}>
              {/* Room label */}
              <div style={{

                  borderLeft: `1px solid ${C.line}`,
                  background: d.today ? CAL_TODAY_BG : 'transparent',
                  position: 'relative',
                  zIndex: 0,
                }} />
              ))}

              {/* Items overlay — absolute-positioned on top of the cell row */}
              <div style={{
                position: 'absolute', left: rowLabelW, top: 0, right: 0, bottom: 0,
                pointerEvents: 'none',
                zIndex: 5,
              }}>
                {/* Drop-target hint on Double room row when Noah is being dragged.
                    Width math: Noah's bk block uses content-box with 24px horizontal
                    padding, so its rendered width is (100%/8 - 6) + 24 = 100%/8 + 18.
                    The indicator has 2px border each side, so its CSS width is
                    (100%/8 + 14) to net the same rendered footprint. */}
                {ri === 1 && dragK > 0 && (
                  <div style={{
                    position: 'absolute',
                    left: `calc(3 * (100% / 8) + (100% / 8) * 0.5 + 3px)`,
                    width: `calc((100% / 8) + 14px)`,
                    top: 14, bottom: 14,
                    borderRadius: 8,
                    border: `2px dashed ${C.greenAccent}`,
                    background: 'rgba(31,191,122,0.12)',
                    // Fade the drop indicator out as Noah lands so it doesn't
                    // visually wrap around his pill once he's seated.
                    opacity: clampK(dragK, 0.05, 0.5) * (1 - clampK(dragK, 0.7, 0.95)),
                  }} />
                )}
                {items.map((it, ii) => {
                  const colW = `calc((100% / 8))`;
                  const startPct = `calc(${(it.kind === 'bk' ? it.start : it.col)} * (100% / 8))`;
                  if (it.kind === 'n') {
                    // Hide the empty number on Double room's THU cell while dragging
                    // — the green dashed drop indicator takes its place.
                    const isHidden = ri === 1 && it.col === 3 && dragK > 0.05;
                    return (
                      <div key={ii} style={{
                        position: 'absolute',
                        left: startPct, width: colW,
                        top: 0, bottom: 0,
                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                        fontSize: 20, color: C.mute, fontWeight: 500,
                        opacity: isHidden ? 0 : 1,
                      }}>{it.n}</div>
                    );
                  }
                  // Booking block
                  const isFocus = ri === focusRow && it.start === focusColStart;
                  const isHover = isFocus && hoverIdx === 0 && selectedIdx < 0 && vibrateK <= 0 && dragK <= 0;
                  const isSelected = isFocus && selectedIdx === 0;
                  const liftK = isSelected ? selectK : 0;
                  const w = `calc(${it.span} * (100% / 8))`;
                  // Block sits halfway over the start day and extends for span days,
                  // visually overlapping the next cell — matches real Sirvoy calendar.
                  const offset = `calc((100% / 8) * 0.5)`;
                  // Drag-and-drop transforms — applied only to the focus block.
                  // vibrateK 0→1: small rotational shake while user "holds" the block.
                  // dragK    0→1: drops one row height (rowH) onto the Double row.
                  const isDragging = isFocus && dragK > 0;
                  const isVibing  = isFocus && vibrateK > 0 && dragK <= 0;
                  const shakeRot = isVibing ? Math.sin(vibrateK * Math.PI * 8) * 1.6 : 0;
                  // After drag completes, settleK ramps the lift / scale back to 0
                  // so Noah lands flat in the cell.
                  const settleEase = 1 - settleK;
                  const liftPx = isFocus ? (vibrateK * 4 + dragK * 6 * settleEase) : (liftK * 3);
                  const dragY = isFocus ? dragK * rowH : 0;
                  const dragScale = isFocus ? 1 + (vibrateK * 0.015) + (dragK * 0.025 * settleEase) : 1;
                  // Source row "ghost" placeholder fades in as block lifts off
                  const ghostOpacity = isFocus ? Math.max(vibrateK, dragK) * 0.5 : 0;
                  return (
                    <div
                      key={ii}
                      data-cursor-target={isFocus ? 'cal-focus' : undefined}
                      style={{
                        position: 'absolute',
                        left: `calc(${startPct} + ${offset} + 3px)`,
                        width: `calc(${w} - 6px)`,
                        top: 14, bottom: 14,
                        background: blockBg(it.tone),
                        color: blockFg(it.tone),
                        borderRadius: 8,
                        display: 'flex', alignItems: 'center',
                        padding: '0 12px', gap: 8,
                        fontSize: 17, fontWeight: 700,
                        letterSpacing: -0.2,
                        overflow: 'hidden',
                        boxShadow: isHover
                          ? '0 0 0 3px rgba(31,191,122,0.55)'
                          : (isDragging || isVibing)
                            ? `0 ${12 * settleEase}px ${28 * settleEase + 4}px rgba(14,34,53,${0.28 * settleEase}), 0 2px 6px rgba(14,34,53,${0.18 * settleEase})`
                            : 'none',
                        outline: (isSelected && liftK > 0) || isDragging || isVibing
                          ? `2px solid ${C.greenAccent}` : 'none',
                        transform: `translate(0, ${dragY - liftPx}px) rotate(${shakeRot}deg) scale(${dragScale})`,
                        transformOrigin: 'center',
                        zIndex: isFocus && (isDragging || isVibing) ? 20 : (isFocus ? 5 : 2),
                      }}
                    >
                      {it.count != null && (
                        <span style={{
                          fontSize: 15, fontWeight: 700,
                          opacity: it.tone === 'dark' ? 0.9 : 0.7,
                        }}>{it.count}</span>
                      )}
                      <span style={{
                        whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
                        flex: 1,
                      }}>{it.name}</span>
                      {it.end != null && (
                        <span style={{
                          fontSize: 15, fontWeight: 600,
                          opacity: 0.55,
                          marginLeft: 'auto',
                        }}>{it.end}</span>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </StepFrame>
  );
};

            </button>
            <div style={{
              width: 24, height: 24, borderRadius: '50%', background: 'white', border: `1px solid ${C.line}`,
              display: 'grid', placeItems: 'center', fontSize: 13, color: C.mute, fontWeight: 600,
            }}>?</div>
          </div>
        </div>

        {/* Row 1 — Key Metrics | Invoicing */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
          <div style={cardStyle(r1K)}>
            <SectionTitle>Key Metrics</SectionTitle>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 24 }}>
              <StatCell
                label="Value"
                currency={CUR}
                value={tickN(STEP8_KM.value.total)}
                sub={`Room: €${fmtNum(STEP8_KM.value.room * kpiE)}\nExtras: €${fmtNum(STEP8_KM.value.extras * kpiE)}`.split('\n').map((s, i) => <div key={i}>{s}</div>)}
              />
              <StatCell label="Average Daily Rate (ADR)"      currency={CUR} value={tickN(STEP8_KM.adr)} />

              {STEP8_OCCUPANCY.map(it => (

        {/* Row 3 — Booking created in this timeframe */}

                ))}

        {/* Row 4 — Charts (Occupied rooms over timeframe) */}
        <div style={cardStyle(r4K, { flex: 1, display: 'flex', flexDirection: 'column', minHeight: 0 })}>
          <SectionTitle>Charts</SectionTitle>
          <div style={{
            display: 'inline-flex', alignItems: 'center', justifyContent: 'space-between',
            gap: 10, padding: '7px 12px',

          </div>
          <div style={{ flex: 1, minHeight: 0 }}>
            <svg viewBox={`0 0 ${CW} ${CH}`} width="100%" height="100%" preserveAspectRatio="none" style={{ display: 'block' }}>
              <defs>
                <linearGradient id="occRoomsFill" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%"  stopColor="#9CC9CD" stopOpacity="0.55" />
                  <stop offset="100%" stopColor="#9CC9CD" stopOpacity="0.05" />
                </linearGradient>
              </defs>

              {/* Y gridlines / labels */}
              {[0, 5, 10, 15, 20, 25, 30, 35].map(v => (
                <g key={v}>
                  <line
                    x1={padL} x2={CW - padR}
                    y1={py(v)} y2={py(v)}
                    stroke="#E4E7EB" strokeWidth="1"
                  />
                  <text
                    x={padL - 6} y={py(v) + 3}
                    fontSize="10" fill="#6A7A8C" textAnchor="end"
                    fontFamily="Inter, system-ui, sans-serif"
                  >{v}</text>
                </g>
              ))}

              {/* Filled area under curve */}
              <path d={areaD} fill="url(#occRoomsFill)" opacity={Easing.easeOutCubic(r4K)} />
              {/* Curve stroke */}
              <path
                d={pathD}
                fill="none"
                stroke="#5A8E94"
                strokeWidth="2"
                strokeLinecap="round"
                strokeLinejoin="round"
                strokeDasharray={lineLen}
                strokeDashoffset={dashOffset}
              />
            </svg>
          </div>
        </div>
      </div>
    </StepFrame>
  );
};

// ──────────────── Master Scene ────────────────
const FlowScene = () => {
  const t = useTime();
  const lt = t % DURATION;

  const T = {
    s1End: 3.2,
    s2Start: 3.2,  s2End: 7.5,    // adds room-number dropdown pick
    s3Start: 7.5,  s3End: 10.0,
    s4Start: 10.0, s4End: 12.3,   // sidebar (calendar)
    s5Start: 12.3, s5End: 14.0,   // calendar overview (no drag-and-drop)
    s6Start: 14.0, s6End: 16.0,
    s7Start: 16.0, s7End: 18.1,   // sidebar (statistics) — extra dwell on the click
    s8Start: 18.1, s8End: 22.8,   // statistics dashboard
    loop: 22.8,
  };

  // Visibility
  // Step 1+2 are now a single continuous screen (form compacts into a summary bar
  // and rooms slide in below). It runs from t=0 → t=s2End, then fades out into Step 3.
  const v12 = clampK(lt, 0, 0.2) * (1 - clampK(lt, T.s2End, T.s2End + 0.3));
  const v3 = clampK(lt, T.s3Start, T.s3Start + 0.3) * (1 - clampK(lt, T.s4Start - 0.4, T.s4Start - 0.1));
  // Step 3 (personal data) stays visible UNDER the sidebar in step 4, then fades to step 5
  const v3Under = clampK(lt, T.s3Start, T.s3Start + 0.3) * (1 - clampK(lt, T.s5Start - 0.0, T.s5Start + 0.3));
  const v5 = clampK(lt, T.s5Start, T.s5Start + 0.3) * (1 - clampK(lt, T.s6Start, T.s6Start + 0.3));
  // Booking detail stays visible UNDER the sidebar in step 7, then crossfades into Statistics in step 8.
  const v6 = clampK(lt, T.s6Start, T.s6Start + 0.3) * (1 - clampK(lt, T.s8Start - 0.0, T.s8Start + 0.4));
  const v8 = clampK(lt, T.s8Start, T.s8Start + 0.4) * (1 - clampK(lt, T.loop - 0.4, T.loop + 0.2));

  // Sidebar slide — opens in step 4 AND in step 7
  const sidebarIn4   = clampK(lt, T.s4Start, T.s4Start + 0.5);
  const sidebarOut4  = clampK(lt, T.s4End - 0.4, T.s4End);
  const sidebarIn7   = clampK(lt, T.s7Start, T.s7Start + 0.5);
  const sidebarOut7  = clampK(lt, T.s7End - 0.4, T.s7End);
  const sidebarK     = sidebarIn4 * (1 - sidebarOut4) + sidebarIn7 * (1 - sidebarOut7);

  const cursorOnCalendar = lt > T.s4Start + 1.2 && lt < T.s4End;
  const calendarClicked  = lt > T.s4Start + 1.7 && lt < T.s7Start;
  // Extended dwell so the viewer clearly sees the cursor land on Statistics,
  // hover for a beat, then click.
  const cursorOnStats    = lt > T.s7Start + 0.95 && lt < T.s7Start + 1.95;
  const statsClicked     = lt > T.s7Start + 1.95;

  const sidebarHover  =
    cursorOnStats ? 'statistics' :
    (cursorOnCalendar && !calendarClicked ? 'calendar' : null);
  const sidebarActive =
    statsClicked     ? 'statistics' :
    calendarClicked  ? 'calendar'   :
    'newbooking';

  // Pulses
  const step2NextPulse  = lt > T.s2Start + 4.0 && lt < T.s2Start + 4.2;
  const step3SavePulse  = lt > T.s3Start + 2.05 && lt < T.s3Start + 2.25;

  // Save confirmation toast: appears right after the Save tap, holds while the
  // sidebar opens, fades out before the user clicks Calendar.
  //   9.75 → 9.95  pop in
  //   9.95 → 11.0  hold
  //   11.0 → 11.4  fade out
  const toastIn  = clampK(lt, T.s3Start + 2.25, T.s3Start + 2.45);
  const toastOut = clampK(lt, T.s4Start + 1.0, T.s4Start + 1.4);
  const toastK   = toastIn * (1 - toastOut);

  // Step 5 — calendar overview. The cursor moves to Noah Adams' pill on
  // Thursday and taps it; that opens Step 6 (booking detail). The drag-and-drop
  // demo was removed because the visual was hard to make clean.
  //   +0.0  → +0.85  cursor crosses calendar
  //   +0.85 → +1.30  hover Noah's pill
  //   +1.30 → end    Noah selected (slight lift)
  const listHoverIdx    = (lt > T.s5Start + 0.85 && lt < T.s5Start + 1.30) ? 0 : -1;
  const listSelectedIdx = lt > T.s5Start + 1.30 ? 0 : -1;
  const calVibrateK     = 0;
  const calDragK        = 0;
  const calSettleK      = 0;

  // ──────────── Cursor path: DOM-anchored ────────────
  // Each waypoint references a `data-cursor-target` key (or an absolute coord).
  // Coordinates are resolved per-frame from getBoundingClientRect against the
  // stage element, eliminating manual layout math.
  // Waypoint shape: [time, target, opacity, dx?, dy?]
  // - target: string key (e.g. 'step1-search') OR {x, y} for absolute stage coords
  // - dx/dy:  optional offset added to the resolved point (used for approach arcs)
  const OFF = { x: SCENE * 0.5, y: SCENE + 60 }; // off-stage rest position (scene coords)

  const path = [
    [0.0,              OFF, 0],
    [T.s1End - 1.4,    OFF, 0],
    [T.s1End - 0.5,    'step1-search', 1],
    [T.s1End - 0.05,   'step1-search', 1], // tap Search

    [T.s2Start + 0.5,  'step2-plus', 0.5, -200, 240],
    [T.s2Start + 1.4,  'step2-plus', 1],
    [T.s2Start + 1.65, 'step2-plus', 1],   // tap +

    // Move down to the Room dropdown that just appeared inside the Single card
    [T.s2Start + 2.4,  'step2-room-select', 1],
    [T.s2Start + 2.6,  'step2-room-select', 1],   // tap select → opens
    // Hover Room 1 (Cleaned), then tap it
    [T.s2Start + 2.85, 'step2-room-option1', 1],
    [T.s2Start + 3.1,  'step2-room-option1', 1],  // tap Room 1

    [T.s2Start + 4.0,  'step2-next', 1],
    [T.s2Start + 4.2,  'step2-next', 1],   // tap Next

    [T.s3Start + 0.5,  { x: SCENE * 0.55, y: SCENE * 0.55 }, 0.5],
    [T.s3Start + 2.05, 'step3-save', 1],
    [T.s3Start + 2.25, 'step3-save', 1],   // tap Save

    [T.s4Start + 0.5,  { x: SCENE * 0.4, y: SCENE * 0.5 }, 0.5],
    [T.s4Start + 1.5,  'sb-calendar', 1],
    [T.s4Start + 1.7,  'sb-calendar', 1],  // tap Calendar

    [T.s5Start + 0.4,  { x: SCENE * 0.45, y: SCENE * 0.5 }, 0.5],
    [T.s5Start + 1.10, 'cal-focus', 1],
    [T.s5Start + 1.30, 'cal-focus', 1],   // tap Noah's pill → opens booking detail
    [T.s5Start + 1.55, 'cal-focus', 0.6, 0, 30],

    [T.s6Start + 0.6,  'step6-title', 1],
    [T.s6Start + 2.0,  'step6-title', 1],

    // Step 7 — sidebar reopens, cursor heads to Statistics and taps it
    [T.s7Start + 0.1,  'step6-title', 0.4],   // ease away from title
    [T.s7Start + 0.4,  { x: SCENE * 0.4, y: SCENE * 0.5 }, 0.6],
    [T.s7Start + 1.05, 'sb-statistics', 1],
    [T.s7Start + 1.60, 'sb-statistics', 1],   // hold the hover
    [T.s7Start + 1.95, 'sb-statistics', 1],   // tap Statistics

    // Step 8 — cursor recedes; the dashboard speaks for itself
    [T.s8Start + 0.5,  'sb-statistics', 0.3, 280, 60],
    [T.loop,           OFF, 0],
  ];

  // Resolve a waypoint's target → {x, y} in stage coordinates.
  // Returns the last-known good coords if the target isn't currently mounted
  // (keeps the cursor from snapping to (0,0) during step transitions).
  const stageRef = React.useRef(null);
  const lastResolvedRef = React.useRef({});
  // Force one extra render after mount so stageRef is populated and the
  // very first frame of resolve() actually finds DOM targets.
  const [, _forceTick] = React.useReducer(x => x + 1, 0);
  React.useLayoutEffect(() => { _forceTick(); }, []);
  const resolve = (target, dx = 0, dy = 0) => {
    if (target && typeof target === 'object' && 'x' in target) {
      return { x: target.x + dx, y: target.y + dy };
    }
    const stage = stageRef.current;
    if (stage) {
      const el = stage.querySelector(`[data-cursor-target="${target}"]`);
      if (el) {
        const sb = stage.getBoundingClientRect();
        const r  = el.getBoundingClientRect();
        // The stageRef div is SCENE×SCENE in design coords, then scaled to fit
        // the canvas. Use its rendered width vs. SCENE to map viewport px
        // back to scene px.
        const scale = sb.width / SCENE || 1;
        const x = (r.left + r.width  / 2 - sb.left) / scale + dx;
        const y = (r.top  + r.height / 2 - sb.top)  / scale + dy;
        lastResolvedRef.current[target] = { x, y };
        return { x, y };
      }
    }
    return lastResolvedRef.current[target] || { x: SCENE / 2, y: SCENE / 2 };
  };

  const cur = (() => {
    let prev = path[0], next = path[path.length - 1];
    for (let i = 0; i < path.length - 1; i++) {
      if (lt >= path[i][0] && lt <= path[i + 1][0]) { prev = path[i]; next = path[i + 1]; break; }
    }
    const pp = resolve(prev[1], prev[3] || 0, prev[4] || 0);
    const np = resolve(next[1], next[3] || 0, next[4] || 0);
    const span = Math.max(0.0001, next[0] - prev[0]);
    const k = Easing.easeInOutCubic(Math.min(1, Math.max(0, (lt - prev[0]) / span)));
    return { x: lerp(pp.x, np.x, k), y: lerp(pp.y, np.y, k), o: lerp(prev[2], next[2], k) };
  })();

  const tapMoments = [
    T.s1End - 0.05,
    T.s2Start + 1.65,
    T.s2Start + 2.6,    // tap dropdown
    T.s2Start + 3.1,    // tap Room 1
    T.s2Start + 4.2,    // tap Next
    T.s3Start + 2.25,
    T.s4Start + 1.7,
    T.s5Start + 1.30,
    T.s7Start + 1.25,
  ];
  const isTapping = tapMoments.some(m => lt >= m - 0.05 && lt <= m + 0.18);

  return (
    <div style={{ position: 'absolute', inset: 0, background: 'transparent', overflow: 'hidden' }}>
      {/* Square 1080×1080 stage. The scene's 1080-wide design coord system
          is scaled by SCENE_SCALE to render into a 670×920 portrait region
          centered inside the 1080-square; the surrounding margins stay
          transparent so the asset composites over a hero background. */}
      <div ref={stageRef} style={{
        position: 'absolute',
        left: INNER_OFFSET_X,
        top:  INNER_OFFSET_Y,
        width:  SCENE_W,
        height: SCENE_H,
        transform: `scale(${SCENE_SCALE})`,
        transformOrigin: '0 0',
        overflow: 'hidden',
        background: 'transparent',
      }}>
      <div style={{
        position: 'absolute', inset: 0,
        background: `radial-gradient(ellipse at 50% 30%, rgba(248,124,86,0.05) 0%, rgba(248,124,86,0) 50%)`,
      }} />

      {v12 > 0 && <Step12_Combined t={lt} visible={v12} nextPulse={step2NextPulse} addedOverride={false} />}
      {v3Under > 0 && <Step3_PersonalData t={lt - T.s3Start} visible={v3Under} savePulse={step3SavePulse} />}
      {v5 > 0 && <Step5_BookingsList t={lt - T.s5Start} visible={v5} hoverIdx={listHoverIdx} selectedIdx={listSelectedIdx} vibrateK={calVibrateK} dragK={calDragK} settleK={calSettleK} />}
      {v6 > 0 && <Step6_BookingDetail t={lt - T.s6Start} visible={v6} />}
      {v8 > 0 && <Step8_Statistics t={lt - T.s8Start} visible={v8} />}

      {sidebarK > 0.001 && (
        <Sidebar
          activeId={sidebarActive}
          hoveredId={sidebarHover}
          slideK={sidebarK}
          introT={lt - (T.s4Start + 0.55)}
        />
      )}

      <SaveToast k={toastK} />

      <Cursor x={cur.x} y={cur.y} opacity={lt >= T.s8Start ? 0 : cur.o} tap={isTapping && lt < T.s8Start} />
      </div>
    </div>
  );
};

// ─────────────────────────────────────────────────────────────────────────────
// Offline frame-by-frame MP4 export.
// No screen-share, no user prompts, no chrome bleed-through. Steps the Stage
// timeline deterministically frame-by-frame, rasterizes the rounded canvas
// element with html-to-image, encodes H.264 via WebCodecs, muxes to .mp4.
// ─────────────────────────────────────────────────────────────────────────────
async function exportVideoOffline(durationSec = DURATION, fps = 30) {
  if (typeof VideoEncoder === 'undefined' || typeof window.Mp4Muxer === 'undefined' || typeof window.htmlToImage === 'undefined') {
    alert(
      'Offline MP4 export needs WebCodecs + html-to-image + mp4-muxer.\n\n' +
      'WebCodecs is supported in Chrome, Edge, and Opera. If you\'re on Safari/Firefox, ' +
      'please use Chrome to render the MP4.'
    );
    return;
  }

  const stageEl = document.querySelector('[data-stage-canvas="true"]');
  if (!stageEl) { alert('Stage element not found.'); return; }

  // Pause playback and freeze at t=0 while we render.
  window.dispatchEvent(new CustomEvent('animstage:set', { detail: { time: 0, playing: false } }));

  // ── Progress overlay ───────────────────────────────────────────────────────
  const overlay = document.createElement('div');
  overlay.style.cssText = `
    position: fixed; inset: 0; z-index: 99999;
    background: rgba(14,34,53,0.92);
    display: flex; align-items: center; justify-content: center;
    font-family: Inter, system-ui, sans-serif; color: white;
  `;
  overlay.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;gap:18px;padding:36px 48px;border-radius:16px;background:#0a1929;border:1px solid rgba(255,255,255,0.1);min-width:360px;">
      <div style="font-size:18px;font-weight:700;letter-spacing:0.2px;">Rendering MP4…</div>
      <div id="__ovl_label" style="font-size:13px;color:#9bb0c5;font-variant-numeric:tabular-nums;">Initializing</div>
      <div style="width:320px;height:8px;background:rgba(255,255,255,0.08);border-radius:999px;overflow:hidden;">
        <div id="__ovl_bar" style="height:100%;width:0%;background:linear-gradient(90deg,#1FBF7A,#3A9DD6);transition:width 0.1s;"></div>
      </div>
      <div style="font-size:11px;color:#5d7895;">Don't close this tab. ~1 min for 24.0s.</div>
    </div>
  `;
  document.body.appendChild(overlay);
  const ovlBar = overlay.querySelector('#__ovl_bar');
  const ovlLabel = overlay.querySelector('#__ovl_label');
  const setProgress = (frame, total, phase) => {
    ovlBar.style.width = (frame / total * 100) + '%';
    ovlLabel.textContent = phase ? phase : `Frame ${frame} / ${total}`;
  };

  try {
    const W = STAGE_W, H = STAGE_H;
    const totalFrames = Math.round(durationSec * fps);
    const frameDurUs = Math.round(1_000_000 / fps);

    // ── Muxer + encoder setup ────────────────────────────────────────────────
    const muxer = new window.Mp4Muxer.Muxer({
      target: new window.Mp4Muxer.ArrayBufferTarget(),
      video: { codec: 'avc', width: W, height: H, frameRate: fps },
      fastStart: 'in-memory',
    });
    const encoder = new VideoEncoder({
      output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
      error: (e) => { console.error('VideoEncoder error:', e); },
    });
    encoder.configure({
      codec: 'avc1.640028',     // H.264 High @ Level 4.0
      width: W, height: H,
      bitrate: 12_000_000,
      framerate: fps,
      avc: { format: 'avc' },
    });

    // ── Pre-warm html-to-image (first call is slow due to font/css inlining) ─
    setProgress(0, totalFrames, 'Warming up…');
    await window.htmlToImage.toCanvas(stageEl, {
      width: W, height: H, pixelRatio: 1, cacheBust: false,
      style: { transform: 'none' },
    });

    // ── Frame loop ───────────────────────────────────────────────────────────
    for (let i = 0; i < totalFrames; i++) {
      const t = i / fps;
      // Drive the timeline.
      window.dispatchEvent(new CustomEvent('animstage:set', { detail: { time: t, playing: false } }));
      // Wait two rAFs so React commits + browser paints the new frame.
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

      const frameCanvas = await window.htmlToImage.toCanvas(stageEl, {
        width: W, height: H,
        pixelRatio: 1,
        cacheBust: false,
        style: { transform: 'none' }, // strip the Stage's auto-scale
      });

      const videoFrame = new VideoFrame(frameCanvas, {
        timestamp: i * frameDurUs,
        duration: frameDurUs,
      });
      // Force a keyframe every 2 seconds for seekability.
      encoder.encode(videoFrame, { keyFrame: i % (fps * 2) === 0 });
      videoFrame.close();

      setProgress(i + 1, totalFrames);

      // Backpressure: if encoder queue grows, give it a tick to drain.
      if (encoder.encodeQueueSize > 8) {
        await new Promise(r => setTimeout(r, 0));
      }
    }

    setProgress(totalFrames, totalFrames, 'Finalizing…');
    await encoder.flush();
    muxer.finalize();

    // ── Download ─────────────────────────────────────────────────────────────
    const buffer = muxer.target.buffer;
    const blob = new Blob([buffer], { type: 'video/mp4' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'sirvoy-flow.mp4';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 2000);

    setProgress(totalFrames, totalFrames, 'Done — file saved');
    await new Promise(r => setTimeout(r, 600));
  } catch (err) {
    console.error(err);
    alert('Render failed:\n' + (err && err.message || err));
  } finally {
    overlay.remove();
    // Resume playback from the start.
    window.dispatchEvent(new CustomEvent('animstage:set', { detail: { time: 0, playing: true } }));
  }
}

// Real-time MP4 capture via screen-share. Kept as a fallback for browsers
// without WebCodecs support. Saves as .mp4 (Chrome) or .webm.
async function recordVideo(durationSec = DURATION) {
  let stream;
  try {
    stream = await navigator.mediaDevices.getDisplayMedia({
      video: { frameRate: 30, width: 1920, height: 1080 },
      audio: false,
      preferCurrentTab: true,
    });
  } catch (err) {
    alert(
      'Recording was cancelled or blocked.\n\n' +
      'If you don\'t see a "share tab" prompt, the embedded preview may be ' +
      'blocking screen capture. Open this page in a standalone browser tab ' +
      '(↗ icon at the top of the preview) and try again.\n\n' +
      (err && err.message || err)
    );
    return;
  }

  // Find the stage so we can crop/scale to 1080x1080
  const stage = document.querySelector('[data-stage-canvas="true"]');

  const srcVideo = document.createElement('video');
  srcVideo.srcObject = stream; srcVideo.muted = true;
  await srcVideo.play();
  await new Promise(r => srcVideo.onloadedmetadata = r);

  const W = 1080, H = 1080;
  const canvas = document.createElement('canvas'); canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  let running = true;
  const drawLoop = () => {
    if (!running) return;
    const sw = srcVideo.videoWidth, sh = srcVideo.videoHeight;
    if (sw && sh) {
      // If we can locate the stage on screen, crop to it; otherwise letterbox
      ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
      if (stage) {
        const rect = stage.getBoundingClientRect();
        const ratioX = sw / window.innerWidth;
        const ratioY = sh / window.innerHeight;
        const cx = rect.left * ratioX;
        const cy = rect.top * ratioY;
        const cw = rect.width * ratioX;
        const ch = rect.height * ratioY;
        const scale = Math.min(W / cw, H / ch);
        const dw = cw * scale, dh = ch * scale;
        const dx = (W - dw) / 2, dy = (H - dh) / 2;
        ctx.drawImage(srcVideo, cx, cy, cw, ch, dx, dy, dw, dh);
      } else {
        const scale = Math.max(W / sw, H / sh);
        const dw = sw * scale, dh = sh * scale;
        const dx = (W - dw) / 2, dy = (H - dh) / 2;
        ctx.drawImage(srcVideo, dx, dy, dw, dh);
      }
    }
    requestAnimationFrame(drawLoop);
  };
  drawLoop();

  const mimeCandidates = ['video/mp4;codecs=avc1.42E01E','video/mp4','video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'];
  const mimeType = mimeCandidates.find(m => MediaRecorder.isTypeSupported(m)) || 'video/webm';
  const ext = mimeType.startsWith('video/mp4') ? 'mp4' : 'webm';

  const canvasStream = canvas.captureStream(30);
  const recorder = new MediaRecorder(canvasStream, { mimeType, videoBitsPerSecond: 14_000_000 });
  const chunks = [];
  recorder.ondataavailable = (e) => { if (e.data && e.data.size) chunks.push(e.data); };
  const stopped = new Promise((resolve) => recorder.onstop = resolve);

  // Reset the stage to t=0 so the recording starts at the beginning
  window.dispatchEvent(new CustomEvent('animstage:set', { detail: { time: 0, playing: true } }));

  // Progress pill
  const progress = document.createElement('div');
  progress.style.cssText = 'position:fixed;left:50%;top:24px;transform:translateX(-50%);z-index:99999;background:#0E2235;color:white;padding:10px 18px;border-radius:999px;font:600 13px system-ui;box-shadow:0 6px 20px rgba(0,0,0,0.3)';
  progress.textContent = 'Recording…';
  document.body.appendChild(progress);

  recorder.start();
  const startedAt = performance.now();
  const tick = setInterval(() => {
    const pct = Math.min(100, Math.round((performance.now() - startedAt) / (durationSec * 1000) * 100));
    progress.textContent = `Recording ${pct}%`;
  }, 200);

  setTimeout(() => {
    clearInterval(tick);
    recorder.stop();
    running = false;
    stream.getTracks().forEach(t => t.stop());
    canvasStream.getTracks().forEach(t => t.stop());
  }, durationSec * 1000 + 200);

  await stopped;
  progress.textContent = 'Encoding…';
  const blob = new Blob(chunks, { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `sirvoy-flow.${ext}`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  progress.remove();
}

// ─────────────────────────────────────────────────────────────────────────────
// Transparent WebM export (alpha channel preserved).
// Renders frame-by-frame to PNG, packs them into a WebM via MediaRecorder
// reading from a canvas with VP9 + alpha support. Chrome/Edge only.
// ─────────────────────────────────────────────────────────────────────────────
async function exportTransparentWebM(durationSec = DURATION, fps = 30) {
  if (typeof window.htmlToImage === 'undefined') {
    alert('Transparent WebM export needs html-to-image. Use Chrome/Edge.');
    return;
  }

  const stageEl = document.querySelector('[data-stage-canvas="true"]');
  if (!stageEl) { alert('Stage element not found.'); return; }

  // MediaRecorder with VP9 + alpha. Chrome supports 'video/webm;codecs=vp9'
  // with the alpha channel from the source canvas when alpha:true.
  const mime = 'video/webm;codecs=vp9';
  if (!window.MediaRecorder || !MediaRecorder.isTypeSupported(mime)) {
    alert('Your browser does not support VP9 WebM recording. Use Chrome or Edge.');
    return;
  }

  window.dispatchEvent(new CustomEvent('animstage:set', { detail: { time: 0, playing: false } }));

  // Progress overlay
  const overlay = document.createElement('div');
  overlay.style.cssText = `
    position: fixed; inset: 0; z-index: 99999;
    background: rgba(14,34,53,0.92);
    display: flex; align-items: center; justify-content: center;
    font-family: Inter, system-ui, sans-serif; color: white;
  `;
  overlay.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;gap:18px;padding:36px 48px;border-radius:16px;background:#0a1929;border:1px solid rgba(255,255,255,0.1);min-width:360px;">
      <div style="font-size:18px;font-weight:700;">Rendering transparent WebM…</div>
      <div id="__wbm_label" style="font-size:13px;color:#9bb0c5;font-variant-numeric:tabular-nums;">Initializing</div>
      <div style="width:320px;height:8px;background:rgba(255,255,255,0.08);border-radius:999px;overflow:hidden;">
        <div id="__wbm_bar" style="height:100%;width:0%;background:linear-gradient(90deg,#3A9DD6,#1FBF7A);transition:width 0.1s;"></div>
      </div>
      <div style="font-size:11px;color:#5d7895;">Don't close this tab.</div>
    </div>
  `;
  document.body.appendChild(overlay);
  const bar = overlay.querySelector('#__wbm_bar');
  const label = overlay.querySelector('#__wbm_label');

  try {
    const W = STAGE_W, H = STAGE_H;
    const totalFrames = Math.round(durationSec * fps);

    // Drawing canvas — must have alpha=true for transparency to survive into VP9.
    const drawCanvas = document.createElement('canvas');
    drawCanvas.width = W; drawCanvas.height = H;
    const ctx = drawCanvas.getContext('2d', { alpha: true });

    // Stream from the canvas; MediaRecorder reads frames at its own cadence.
    const stream = drawCanvas.captureStream(0);
    const track = stream.getVideoTracks()[0];
    // requestFrame() is how we manually advance the stream in lockstep with our render loop.
    const chunks = [];
    const recorder = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 12_000_000 });
    recorder.ondataavailable = (e) => { if (e.data && e.data.size) chunks.push(e.data); };
    const stopped = new Promise(r => recorder.onstop = r);
    recorder.start();

    // Pre-warm html-to-image
    label.textContent = 'Warming up…';
    await window.htmlToImage.toCanvas(stageEl, { width: W, height: H, pixelRatio: 1, cacheBust: false, backgroundColor: null, style: { transform: 'none' } });

    for (let i = 0; i < totalFrames; i++) {
      const t = i / fps;
      window.dispatchEvent(new CustomEvent('animstage:set', { detail: { time: t, playing: false } }));
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

      const frameCanvas = await window.htmlToImage.toCanvas(stageEl, {
        width: W, height: H, pixelRatio: 1, cacheBust: false,
        backgroundColor: null, // critical — preserves alpha
        style: { transform: 'none' },
      });

      ctx.clearRect(0, 0, W, H);
      ctx.drawImage(frameCanvas, 0, 0, W, H);
      track.requestFrame && track.requestFrame();

      // Hold long enough for the recorder to consume the frame at our fps cadence.
      await new Promise(r => setTimeout(r, 1000 / fps));

      bar.style.width = ((i + 1) / totalFrames * 100) + '%';
      label.textContent = `Frame ${i + 1} / ${totalFrames}`;
    }

    label.textContent = 'Finalizing…';
    recorder.stop();
    await stopped;

    const blob = new Blob(chunks, { type: 'video/webm' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'sirvoy-flow-transparent.webm';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 2000);

    label.textContent = 'Done — file saved';
    await new Promise(r => setTimeout(r, 600));
  } catch (err) {
    console.error(err);
    alert('Transparent WebM render failed:\n' + (err && err.message || err));
  } finally {
    overlay.remove();
    window.dispatchEvent(new CustomEvent('animstage:set', { detail: { time: 0, playing: true } }));
  }
}

function App() {
  const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const roomImages = { single: tw.singleImg, double: tw.doubleImg, queen: tw.queenImg };
  const bg = tw.bgMode === 'green' ? '#00FF00'
           : tw.bgMode === 'cream' ? C.bg
           : tw.bgMode === 'navy'  ? '#0E2235'
           : 'transparent';
  return (
    <TweaksContext.Provider value={roomImages}>
      <Stage width={STAGE_W} height={STAGE_H} duration={DURATION} background={bg} loop={true}>
        <Sprite start={0} end={DURATION}><FlowScene /></Sprite>
      </Stage>
      <TweaksPanel title="Booking flow video">
        <TweakSection label="Export" />
        <TweakButton label="Render MP4 (no transparency)" onClick={() => exportVideoOffline()} />
        <TweakButton label="Render WebM (transparent ✓)"  onClick={() => exportTransparentWebM()} secondary />
        <div style={{fontSize:11, color:'#9bb0c5', padding:'4px 12px 8px', lineHeight:1.4}}>
          MP4/H.264 cannot store an alpha channel. For a transparent video,
          render WebM (VP9 + alpha) — works in Chrome/Edge and imports cleanly
          into Premiere, After Effects, DaVinci Resolve and Final Cut.
        </div>
        <TweakSection label="Export background" />
        <TweakRadio label="Background" value={tw.bgMode}
                    options={['green', 'cream', 'navy', 'none']}
                    onChange={(v) => setTweak('bgMode', v)} />
        <TweakSection label="Room photos" />
        <RoomImageTweak label="Single room" value={tw.singleImg} onChange={(v) => setTweak('singleImg', v)} />
        <RoomImageTweak label="Double room" value={tw.doubleImg} onChange={(v) => setTweak('doubleImg', v)} />
        <RoomImageTweak label="Queen room"  value={tw.queenImg}  onChange={(v) => setTweak('queenImg', v)} />
      </TweaksPanel>
    </TweaksContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
